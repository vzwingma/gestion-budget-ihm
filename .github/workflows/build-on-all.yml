name: CI on all branches
# Controls when the action will run.
# Triggers the workflow on push or pull request events on all but the master branch
on:
  push:
    # Sequence of patterns matched against refs/heads
    branches-ignore: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Update config in .env
        env:
          OIDC_CLIENT_ID: ${{ secrets.OIDC_CLIENT_ID }}
          OIDC_CLIENT_SECRET: ${{ secrets.OIDC_CLIENT_SECRET }}
        run: |
          sed -i -e "s#__OIDC_CLIENT_ID__#$OIDC_CLIENT_ID#g" -e "s#__OIDC_CLIENT_SECRET__#$OIDC_CLIENT_SECRET#g" external-ressources/conf/.env.dev
      - run: mv external-ressources/conf/.env.dev .env
        name: Set env DEV
      - run: npm ci --ignore-scripts
        name: CI Install
      - run: npm run build --if-present
        name: Build

  # LINT
  lint:
    permissions:
      contents: read
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm install eslint --save --ignore-scripts
      - run: npm run lint
